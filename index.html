<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta
			content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
			name="viewport"
		/>
		<title>The Blasty Blocks</title>
		<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
		<link href="./style.css" rel="stylesheet" />
		<script type="module" src="./src/index.ts" defer></script>
	</head>

	<body
		class="flex items-center justify-between p-2 flex-col h-screen select-none w-screen"
	>
		<div class="mobile-top-bar">
			<button
				class="icon-btn"
				id="volume-btn"
				data-i18n-title="button.volume.hover"
			>
				🔊
			</button>
			<button
				class="icon-btn"
				data-i18n-title="button.help.hover"
				id="help-btn"
			>
				❔
			</button>
			<button
				class="icon-btn"
				data-i18n-title="button.log.hover"
				id="log-btn"
			>
				📜
			</button>
			<select class="icon-btn" title="Language" id="i18n-btn">
				<optgroup label="Language">
					<option value="ru">🇷🇺</option>
					<option value="en">🇺🇸</option>
					<option value="uk">🇺🇦</option>
				</optgroup>
			</select>
		</div>
		<div class="volume-panel">
			<div class="flex items-center justify-between mb-2">
				<span
					class="text-xs tracking-widest text-slate-300 uppercase"
					data-i18n="volume_panel.volume"
				></span>

				<button
					class="border px-2 py-1 rounded text-xs font-bold"
					style="
						background: var(--ui-surface2);
						border-color: var(--ui-border);
						color: #e2e8f0;
					"
					id="mute-btn"
				>
					MUTE
				</button>
			</div>

			<div class="flex items-center justify-between mb-1">
				<div
					class="text-xs tracking-widest text-slate-300 uppercase"
					data-i18n="volume_panel.music"
				></div>
				<div
					class="font-bold text-xs text-slate-200"
					id="music-vol-label"
				></div>
			</div>
			<input
				class="w-full"
				id="music-volume"
				max="100"
				min="0"
				type="range"
				value="0"
			/>
			<div
				class="text-xs text-slate-400 mt-1"
				data-i18n="volume_panel.desc"
			></div>
		</div>
		<main>
			<div class="flex flex-col gap-2 max-w-md w-full z-10">
				<div
					class="flex items-center justify-between p-2 backdrop-blur-sm rounded-lg shadow-lg themed-panel"
				>
					<div class="flex flex-col">
						<span
							class="text-xs text-slate-400 tracking-widest"
							data-i18n="label.depth"
						></span>
						<span
							class="font-bold pixel-font text-lg text-yellow-300"
							id="level-display"
							>DEPTH 1</span
						>
						<span
							class="text-xs text-slate-400 tracking-widest mt-1"
							data-i18n="label.gold"
						></span>
						<span
							class="font-bold pixel-font text-amber-200 text-sm"
							id="gold-display"
							>0</span
						>
					</div>
					<div class="flex items-center flex-col gap-1">
						<div
							class="text-xs bg-black/30 border border-white/15 cursor-pointer hidden px-2 py-1 rounded-full"
							id="hazard-badge"
							data-i18n-title="hazard_badge.hover"
						>
							<span id="hazard-badge-text"></span>
						</div>
						<div
							class="flex gap-1 opacity-95"
							id="affinity-container"
						></div>
					</div>
					<div class="flex flex-col items-end">
						<span
							class="text-xs text-slate-400 tracking-widest"
							data-i18n="label.score"
						></span>
						<span
							class="font-bold pixel-font text-white text-lg"
							id="score-display"
							>0</span
						>
					</div>
				</div>
				<div
					class="flex gap-2 backdrop-blur-sm items-start justify-between p-2 rounded-lg shadow-lg themed-panel2"
				>
					<div
						class="text-xs text-slate-300 whitespace-nowrap"
						data-i18n="run_info.artifacts"
					></div>
					<div
						class="flex gap-1 flex-wrap justify-end"
						id="artifacts-container"
					></div>
				</div>
				<div class="rounded-lg themed-panel2 px-3 py-2 text-xs">
					<div
						class="text-xs text-slate-400 tracking-widest"
						data-i18n="run_info.log_peek"
					></div>
					<div class="truncate text-slate-200" id="log-peek">—</div>
				</div>
			</div>
			<div class="flex items-center adaptive">
				<div
					class="flex items-center justify-center w-full flex-1 flex-col gap-4 max-w-md relative"
				>
					<div
						class="flex items-center justify-between px-4 relative w-full"
					>
						<div class="flex flex-col w-28">
							<span
								class="font-bold text-xs mb-1 text-blue-300"
								data-i18n="label.hero"
							></span>
							<div class="w-full bar-container mb-1">
								<div
									class="hp-fill"
									id="player-hp-bar"
									style="width: 100%"
								></div>
							</div>
							<div class="text-xs text-white" id="player-hp-text">
								100/100
							</div>
							<div class="flex items-center gap-2 mt-1">
								<div
									class="flex items-center gap-1 text-blue-400 text-xs"
									data-i18n-title="shield.hover"
								>
									<svg
										class="h-3 w-3"
										fill="currentColor"
										viewBox="0 0 20 20"
									>
										<path
											d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
										/>
									</svg>
									<span id="player-shield">0</span>
								</div>
								<div
									class="flex gap-1 flex-wrap"
									id="player-status"
								></div>
							</div>
						</div>
						<div class="flex items-center flex-col">
							<div
								class="flex items-center justify-center cursor-pointer enemy-sprite hover-anim mb-2 rounded-xl"
								id="enemy"
								data-i18n-title="enemy.hover"
							>
								<div class="enemy-eye left"></div>
								<div class="enemy-eye right"></div>
								<div
									class="bg-black absolute bottom-2 h-2 opacity-45 rounded-full w-8"
								></div>
							</div>
							<div
								class="flex items-center gap-2 font-bold intent-chip px-2 py-1 rounded text-xs"
							>
								<span id="enemy-intent">ATK 10</span>
								<span class="opacity-90" id="enemy-element"
									>⚔️</span
								>
							</div>
						</div>
						<div class="flex flex-col items-end w-28">
							<span
								class="font-bold text-xs mb-1 text-red-300"
								id="enemy-label"
								data-i18n="label.enemy"
							></span>
							<div class="w-full bar-container mb-1">
								<div
									class="hp-fill bg-purple-600"
									id="enemy-hp-bar"
									style="width: 100%"
								></div>
							</div>
							<div class="text-xs text-white" id="enemy-hp-text">
								200/200
							</div>
							<div
								class="flex gap-1 flex-wrap justify-end mt-1"
								id="enemy-status"
							></div>
						</div>
					</div>
					<div class="game-grid" id="grid-container"></div>
					<div
						class="flex items-center justify-center inset-0 hidden absolute pointer-events-none z-40"
						id="feedback-overlay"
					>
						<h1
							class="pixel-font font-black drop-shadow-lg text-5xl text-yellow-300"
							style="-webkit-text-stroke: 2px #000"
						>
							CRIT!
						</h1>
					</div>
				</div>
				<div
          id="hand"
					class="w-full p-4 max-w-md rounded-t-xl shadow-2xl themed-footer z-20"
				>
					<div class="flex items-center justify-between mb-2">
						<div class="flex items-center gap-2">
							<span
								class="text-slate-400 tracking-widest text-xs uppercase"
								data-i18n="label.hand"
							></span>
						</div>
						<button
							id="discard-btn"
							class="border px-2 py-1 rounded text-xs transition-colors"
							data-i18n="button.next_turn"
							style="
								background: var(--ui-surface2);
								border-color: var(--ui-border);
								color: #e2e8f0;
							"
						></button>
					</div>
					<div
            class="flex items-center w-full min-h-24"
						id="hand-container"
					></div>
					<div
						class="text-xs mt-1 pb-1 text-center text-slate-500"
						data-i18n="hand.tip"
					>
					</div>
				</div>
			</div>
		</main>
		<div
			class="flex items-center justify-center flex-col fixed inset-0 z-50 bg-black/95"
			id="difficulty-modal"
		>
			<h1
				class="pixel-font text-4xl mb-8 text-blue-400"
				data-i18n="label.difficulty"
			></h1>
			<div class="flex flex-col gap-4 w-64">
				<button
					class="font-bold pixel-font rounded px-6 group overflow-hidden py-4 relative text-left text-white bg-emerald-700 hover:bg-emerald-600"
					id="startGame-easy"
				>
					<span
						class="z-10 relative"
						data-i18n="button.start_game.easy"
					></span>
					<span
						class="text-[10px] mt-1 block relative z-10 text-emerald-200"
						data-i18n="button.start_game.easy.desc"
					></span>
					<div
						class="inset-0 absolute group-hover:opacity-10 opacity-0 transition-opacity bg-emerald-500"
					></div>
				</button>
				<button
					class="font-bold pixel-font rounded px-6 group overflow-hidden py-4 relative text-left text-white bg-blue-700 hover:bg-blue-600"
					id="startGame-normal"
				>
					<span
						class="z-10 relative"
						data-i18n="button.start_game.normal"
					></span>
					<span
						class="text-[10px] mt-1 block relative z-10 text-blue-200"
						data-i18n="button.start_game.normal.desc"
					></span>
					<div
						class="inset-0 absolute group-hover:opacity-10 opacity-0 transition-opacity bg-blue-500"
					></div>
				</button>
				<button
					class="font-bold pixel-font rounded px-6 group overflow-hidden py-4 relative text-left text-white bg-red-700 hover:bg-red-600"
					id="startGame-hard"
				>
					<span
						class="z-10 relative"
						data-i18n="button.start_game.hard"
					></span>
					<span
						class="text-[10px] mt-1 block relative z-10 text-red-200"
						data-i18n="button.start_game.hard.desc"
					></span>
					<div
						class="inset-0 absolute group-hover:opacity-10 opacity-0 transition-opacity bg-red-500"
					></div>
				</button>
			</div>
		</div>
		<div
			class="flex items-center justify-center flex-col fixed inset-0 z-50 hidden bg-black/90"
			id="game-over-modal"
		>
			<h1
				class="pixel-font text-4xl mb-4 text-red-400"
				data-i18n="game_over.title"
			></h1>
			<p class="mb-3 text-white" id="final-score"></p>
			<p class="text-slate-300 mb-8" id="final-depth"></p>
			<button
				class="font-bold pixel-font rounded bg-white hover:bg-gray-200 text-black py-3 px-6"
				id="new-game-btn"
				data-i18n="button.new_game"
			></button>
		</div>
		<div
			class="flex items-center justify-center flex-col fixed inset-0 z-50 bg-black/95 hidden"
			id="victory-modal"
		>
			<h1
				class="pixel-font text-yellow-300 mb-2 text-3xl"
				data-i18n="victory_modal.trophies"
			></h1>
			<p
				class="text-slate-400 mb-6 text-sm"
				data-i18n="victory_modal.choose_reward"
			></p>
			<div
				class="flex flex-col justify-center gap-4 w-full items-stretch max-w-2xl md:flex-row px-4"
				id="reward-container"
			></div>
		</div>
		<div class="inset-0 fixed z-50 bg-black/95 hidden" id="shop-modal">
			<div class="flex items-center justify-center w-full h-full px-4">
				<div
					class="w-full p-4 card-glow rounded-xl bg-slate-900 border border-slate-700 max-w-3xl scroll"
				>
					<div class="flex items-center justify-between">
						<div>
							<div
								class="text-xs text-slate-400 tracking-widest"
								data-i18n="label.shop"
							></div>
							<div
								class="pixel-font text-lg font-black text-amber-200"
								data-i18n="shop.title"
							></div>
						</div>
						<div class="text-right">
							<div
								class="text-xs text-slate-400 tracking-widest"
							></div>
							<div
								class="pixel-font text-lg font-black text-amber-200"
								id="shop-gold"
							>
								0
							</div>
						</div>
					</div>
					<div
						class="border bg-black/30 border-white/10 p-3 rounded-lg mt-3 text-slate-200 text-sm"
						data-i18n="shop.desc"
					></div>
					<div
						class="gap-3 grid grid-cols-1 md:grid-cols-3 mt-4"
						id="shop-container"
					></div>
					<div class="flex gap-2 mt-4">
						<button
							class="font-bold pixel-font rounded bg-white hover:bg-gray-200 text-black py-3 flex-1 px-4"
							id="shop-skip"
							data-i18n="button.next"
						></button>
					</div>
					<div
						class="text-slate-400 text-xs mt-3"
						data-i18n="shop.tip"
					></div>
				</div>
			</div>
		</div>
		<div class="inset-0 fixed z-50 bg-black/95 hidden" id="hazard-modal">
			<div class="flex items-center justify-center w-full h-full px-4">
				<div
					class="w-full p-4 card-glow rounded-xl max-w-md themed-card"
				>
					<div class="flex items-center justify-between mb-2">
						<h2
							class="pixel-font text-lg font-black text-red-200"
							id="hazard-header"
							data-i18n="label.hazard"
						></h2>
						<div class="text-2xl" id="hazard-icon">⚠️</div>
					</div>
					<div
						class="border bg-black/30 border-white/10 p-3 rounded-lg"
					>
						<div
							class="font-bold text-yellow-200"
							id="hazard-title"
							data-i18n="hazard.title"
						></div>
						<div
							class="text-sm mt-1 text-slate-300"
							id="hazard-desc"
							data-i18n="hazard.desc"
						></div>
					</div>
					<div class="flex gap-2 mt-4">
						<button
							class="font-bold pixel-font rounded bg-white hover:bg-gray-200 text-black py-3 flex-1 px-4"
							id="hazard-continue"
							data-i18n="button.fight"
						></button>
					</div>
				</div>
			</div>
		</div>
		<div class="inset-0 fixed z-50 bg-black/95 hidden" id="help-modal">
			<div class="flex items-center justify-center w-full h-full px-4">
				<div
					class="scroll w-full p-4 card-glow rounded-xl bg-slate-900 border border-slate-700 max-w-3xl"
				>
					<div class="flex items-center justify-between mb-3">
						<div>
							<div
								class="text-xs text-slate-400 tracking-widest"
								data-i18n="label.help"
							></div>
							<div
								class="pixel-font text-lg font-black text-slate-100"
								data-i18n="help_modal.title"
							></div>
						</div>
						<button
							class="font-bold pixel-font rounded bg-white hover:bg-gray-200 text-black px-3 py-2"
							id="close-help-btn"
							data-i18n="button.ok"
						></button>
					</div>
					<div class="gap-3 grid grid-cols-1 md:grid-cols-2">
						<div
							class="border bg-black/30 border-white/10 p-3 rounded-lg"
						>
							<div
								class="font-bold text-yellow-200"
								data-i18n="help_modal.how_to_play"
							>
							</div>
							<ul
								class="text-sm text-slate-200 mt-2 space-y-1"
								data-i18n-html="help_modal.how_to_play.list"
							></ul>
						</div>
						<div
							class="border bg-black/30 border-white/10 p-3 rounded-lg"
						>
							<div
								class="font-bold text-yellow-200"
								data-i18n="help_modal.status"
							></div>
							<div
								class="text-sm text-slate-200 mt-2 space-y-2"
								id="codex-status"
							></div>
						</div>
						<div
							class="border bg-black/30 border-white/10 p-3 rounded-lg md:col-span-2"
						>
							<div
								class="font-bold text-yellow-200"
								data-i18n="help_modal.fight_conditions"
							></div>
							<div
								class="text-sm text-slate-200 mt-2 space-y-2 codex-scroll"
								id="codex-hazards"
								style="max-height: 190px; overflow: auto"
							></div>
						</div>
						<div
							class="border bg-black/30 border-white/10 p-3 rounded-lg md:col-span-2"
						>
							<div
								class="font-bold text-yellow-200"
								data-i18n="help_modal.current_enemy"
							></div>
							<div
								class="text-sm text-slate-200 mt-2"
								id="codex-enemy"
							></div>
						</div>
					</div>
					<div
						class="text-slate-400 text-xs mt-4"
						data-i18n="help_modal.tip"
					></div>
				</div>
			</div>
		</div>
		<div class="inset-0 fixed z-50 bg-black/95 hidden" id="log-modal">
			<div class="flex items-center justify-center w-full h-full px-4">
				<div
					class="w-full p-4 card-glow rounded-xl bg-slate-900 border border-slate-700 max-w-3xl"
				>
					<div class="flex items-center justify-between mb-3">
						<div>
							<div
								class="text-xs text-slate-400 tracking-widest"
								data-i18n="label.log"
							></div>
							<div
								class="pixel-font text-lg font-black text-slate-100"
								data-i18n="log_modal.events"
							></div>
						</div>
						<div class="flex gap-2 btn-holder">
							<button
								class="font-bold pixel-font rounded px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-100 danger-btn"
								id="clear-log-btn"
								data-i18n="button.clear"
							></button>
							<button
								class="font-bold pixel-font rounded bg-white hover:bg-gray-200 text-black px-3 py-2 ok-btn"
								id="close-log-btn"
								data-i18n="button.ok"
							></button>
						</div>
					</div>
					<div
						class="log-box"
						id="log-box"
						style="max-height: 65vh"
					></div>
				</div>
			</div>
		</div>
	</body>
</html>
