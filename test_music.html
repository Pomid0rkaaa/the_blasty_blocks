<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Blasty Blocks - Music Preview</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .controls {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            position: sticky;
            top: 20px;
            z-index: 10;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }
        button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        button.secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text);
        }
        .track-list {
            display: grid;
            gap: 10px;
        }
        .track-item {
            background: var(--card);
            padding: 12px 16px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: border-color 0.2s;
        }
        .track-item.active {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
        }
        .track-info {
            display: flex;
            flex-direction: column;
        }
        .track-name {
            font-weight: 600;
            font-size: 1.05rem;
        }
        .track-meta {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 2px;
        }
        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex: none;
        }
        .badge {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            margin-left: 8px;
            text-transform: uppercase;
        }
        .badge.boss { background: #ef4444; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Music Preview</h1>
        
        <div class="controls">
            <button id="startBtn">Start Audio Engine</button>
            <button id="stopBtn" class="secondary">Stop Music</button>
        </div>
        <div id="status" style="font-size: 0.75rem; color: var(--text-dim); margin-top: 10px; text-align: center;"> Click 'Start' to enable audio </div>

        <div class="track-list" id="trackList"></div>
    </div>

    <script>
        /**********************
         * TRACK DEFINITIONS
         **********************/
        const TRACKS = {
            deep: {
                name: "Depth",
                tempo: 85,
                prog: [[57, 60, 64], [57, 60, 64], [53, 57, 60], [55, 59, 62]],
                arp: [0, 1, 2, 1, 0, null, 1, 2],
                bassType: "triangle", leadType: "sine", lead2Type: "sine", padType: "sine", drums: "k.h.k.h."
            },
            cyber: {
                name: "Cyber",
                tempo: 125,
                prog: [[57, 60, 64], [60, 64, 67], [58, 62, 65], [55, 59, 62]],
                arp: [0, 1, 0, 2, 1, 0, 2, null],
                bassType: "square", leadType: "sawtooth", lead2Type: "square", padType: "sawtooth", drums: "k.h.s.h.k.khs."
            },
            magma: {
                name: "Magma",
                tempo: 105,
                prog: [[57, 61, 64], [58, 62, 65], [57, 61, 64], [55, 58, 62]],
                arp: [0, null, 1, null, 2, 1, 0, 1],
                bassType: "sawtooth", leadType: "square", lead2Type: "random", padType: "sawtooth", drums: "k..h.ks."
            },
            ice: {
                name: "Ice",
                tempo: 80,
                prog: [[60, 63, 67], [58, 62, 65], [56, 60, 63], [55, 58, 62]],
                arp: [0, 2, null, 1, null, 0, 2, 1],
                bassType: "sine", leadType: "sine", lead2Type: "triangle", padType: "sine", drums: "k...h..."
            },
            glitch: {
                name: "Glitch",
                tempo: 130,
                prog: [[57, 58, 62], [55, 56, 60], [60, 61, 65], [57, 58, 62]],
                arp: [0, 1, 0, null, 2, 1, 0, 2, null, 1, 0, 1, 2, 0, null, 2],
                bassType: "random", leadType: "random", lead2Type: "random", padType: "random", drums: "kh.s.hkh.s..h.s"
            },
            boss_fire: {
                name: "Inferno",
                tempo: 140,
                prog: [[57, 60, 64], [58, 62, 65], [55, 59, 62], [52, 55, 59]],
                arp: [0, 1, 2, 1, 0, 2, 1, 2],
                bassType: "sawtooth", leadType: "sawtooth", lead2Type: "square", padType: "sawtooth", drums: "kkhshkhs"
            },
            boss_ice: {
                name: "Blizzard",
                tempo: 130,
                prog: [[60, 63, 67], [59, 62, 65], [51, 54, 58], [50, 53, 57]],
                arp: [0, 2, 1, 0, 2, 1, null, 2],
                bassType: "sine", leadType: "square", lead2Type: "sine", padType: "sine", drums: "k.hs.khs"
            },
            boss_storm: {
                name: "Maelstrom",
                tempo: 155,
                prog: [[57, 61, 64], [55, 59, 62], [57, 61, 64], [59, 62, 66]],
                arp: [0, 2, 1, 0, 1, 2, 0, 1, 2, 0, 1, 2, 0, 2, 1, 0],
                bassType: "square", leadType: "sawtooth", lead2Type: "square", padType: "square", drums: "kshskshs"
            },
            boss_earth: {
                name: "Cataclysm",
                tempo: 90,
                prog: [[48, 52, 55], [47, 51, 54], [45, 49, 52], [46, 50, 53]],
                arp: [0, null, 1, null, 2, 1, 0, null],
                bassType: "square", leadType: "square", lead2Type: "sawtooth", padType: "sawtooth", drums: "k.k.s.k."
            },
            boss_void: {
                name: "Singularity",
                tempo: 110,
                prog: [[57, 58, 62], [56, 57, 61], [54, 55, 59], [52, 53, 57]],
                arp: [0, 1, 2, 0, 1, 2, null, 2],
                bassType: "random", leadType: "random", lead2Type: "random", padType: "random", drums: "k.h.s.h.k.h.s.h"
            },
            boss_poison: {
                name: "Venom",
                tempo: 125,
                prog: [[57, 58, 61], [56, 57, 60], [58, 59, 62], [55, 56, 59]],
                arp: [0, 1, 2, null, 1, 0, 2, 1],
                bassType: "sawtooth", leadType: "sine", lead2Type: "triangle", padType: "sawtooth", drums: "k.hs.khs"
            },
            retro: {
                name: "Retro",
                tempo: 115,
                prog: [[60, 64, 67], [65, 69, 72], [67, 71, 74], [62, 66, 69]],
                arp: [0, 1, 2, 1, 0, 2, 1, 0, null, 1, 2, 1, 0, 2, 1, null],
                bassType: "square", leadType: "square", lead2Type: "random", padType: "random", drums: "k.h.s.h."
            },
            lullaby: {
                name: "Lullaby",
                tempo: 75,
                prog: [[60, 64, 67, 72], [62, 65, 69, 74]],
                arp: [0, null, 1, null, 2, null, 3, null],
                bassType: "sine", leadType: "random", lead2Type: "sine", padType: "sine", drums: "k......."
            }
        };

        /**********************
         * SOUND MANAGER (JS)
         **********************/
        class SoundManager {
            constructor() {
                this.ctx = null;
                this.initialized = false;
                this.master = null;
                this.musicGain = null;
                this.analyser = null;
                this.musicTimer = null;
                this.musicStep = 0;
                this.trackId = "deep";
                this.speedMult = 1.33;
            }

            init() {
                if (this.initialized) return true;
                try {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.master = this.ctx.createGain();
                    this.musicGain = this.ctx.createGain();
                    this.analyser = this.ctx.createAnalyser();
                    this.analyser.fftSize = 64;

                    this.master.gain.value = 0.9;
                    this.musicGain.gain.value = 0.3;

                    // Small ambience chain
                    const delay = this.ctx.createDelay(0.6);
                    delay.delayTime.value = 0.22;
                    const fb = this.ctx.createGain();
                    fb.gain.value = 0.22;
                    const lp = this.ctx.createBiquadFilter();
                    lp.frequency.value = 1400;

                    this.musicGain.connect(lp);
                    lp.connect(this.master);
                    lp.connect(delay);
                    delay.connect(fb); fb.connect(delay);
                    delay.connect(this.master);

                    this.master.connect(this.analyser);
                    this.analyser.connect(this.ctx.destination);

                    this.initialized = true;
                    return true;
                } catch (e) {
                    console.error("Audio init failed", e);
                    return false;
                }
            }

            midiToFreq(m) {
                return 440 * Math.pow(2, (m - 69) / 12);
            }

            getInst(type) {
                const types = ["sine", "square", "sawtooth", "triangle"];
                if (type === "random") return types[Math.floor(Math.random() * types.length)];
                return type || "sine";
            }

            playNote(midi, dur, vol, type, outGain, lpHz = 1800) {
                if (!this.ctx || !Number.isFinite(midi)) return;
                const freq = this.midiToFreq(midi);
                if (!Number.isFinite(freq)) return;

                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();

                osc.type = type;
                osc.frequency.setValueAtTime(freq, t);
                filter.frequency.setValueAtTime(lpHz, t);

                gain.gain.setValueAtTime(vol, t);
                gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(outGain);
                osc.start(t);
                osc.stop(t + dur);
            }

            playNoise(duration, vol, hp = 3000) {
                if (!this.ctx) return;
                const sr = this.ctx.sampleRate;
                const len = sr * duration;
                const buf = this.ctx.createBuffer(1, len, sr);
                const data = buf.getChannelData(0);
                for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);

                const src = this.ctx.createBufferSource();
                src.buffer = buf;
                const filter = this.ctx.createBiquadFilter();
                filter.type = "highpass";
                filter.frequency.value = hp;
                const g = this.ctx.createGain();
                g.gain.value = vol;
                src.connect(filter); filter.connect(g); g.connect(this.musicGain);
                src.start();
            }

            playKick(vol = 0.05) {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const g = this.ctx.createGain();
                osc.frequency.setValueAtTime(120, t);
                osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
                g.gain.setValueAtTime(vol, t);
                g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
                osc.connect(g); g.connect(this.musicGain);
                osc.start(); osc.stop(t + 0.1);
            }

            stop() {
                if (this.musicTimer) clearInterval(this.musicTimer);
                this.musicTimer = null;
                this.musicStep = 0;
            }

            start(id) {
                this.stop();
                if (!this.init()) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                this.trackId = id;
                const track = TRACKS[id];
                const stepMs = (60000 / track.tempo / 2) * this.speedMult;

                this.musicTimer = setInterval(() => {
                    const bar = Math.floor(this.musicStep / 8) % track.prog.length;
                    const chord = track.prog[bar];
                    const pattern = track.drums || "k.s.";
                    const d = pattern[this.musicStep % pattern.length];

                    if (d === 'k') this.playKick();
                    if (d === 's') this.playNoise(0.04, 0.02, 3000);
                    if (d === 'h') this.playNoise(0.01, 0.015, 8000);

                    if (this.musicStep % 8 === 0) {
                        chord.forEach(m => this.playNote(m, (60/track.tempo)*4, 0.015, this.getInst(track.padType), this.musicGain, 600));
                    }
                    if (this.musicStep % 2 === 0) {
                        this.playNote(chord[0] - 12, 0.2, 0.08, this.getInst(track.bassType), this.musicGain, 1000);
                    }
                    const idx = track.arp[this.musicStep % track.arp.length];
                    if (idx !== null) {
                        this.playNote(chord[idx] + 12, 0.15, 0.05, this.getInst(track.leadType), this.musicGain, 2200);
                    }
                    if (this.musicStep % 16 === 15) {
                        this.playNote(chord[chord.length-1] + 24, 0.15, 0.03, this.getInst(track.lead2Type), this.musicGain, 4000);
                    }
                    this.musicStep++;
                }, stepMs);
            }
        }

        /**********************
         * UI & APP LOGIC
         **********************/
        const sm = new SoundManager();
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const list = document.getElementById('trackList');
        const status = document.getElementById('status');

        function render() {
            Object.entries(TRACKS).forEach(([id, t]) => {
                const item = document.createElement('div');
                item.className = `track-item ${sm.trackId === id ? 'active' : ''}`;
                item.id = `track-${id}`;
                
                const isBoss = id.startsWith('boss_');
                
                item.innerHTML = `
                    <div class="track-info">
                        <div class="track-name">${t.name} ${isBoss ? '<span class="badge boss">Boss</span>' : ''}</div>
                        <div class="track-meta">${t.tempo} BPM • ${t.bassType}/${t.leadType}</div>
                    </div>
                    <button class="play-btn" onclick="playTrack('${id}')">▶</button>
                `;
                list.appendChild(item);
            });
        }

        window.playTrack = (id) => {
            if (!sm.initialized) sm.init();
            sm.start(id);
            document.querySelectorAll('.track-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`track-${id}`).classList.add('active');
            status.textContent = `Playing: ${TRACKS[id].name}`;
        };

        startBtn.onclick = () => {
            sm.init();
            sm.ctx.resume();
            startBtn.textContent = "Engine Online";
            startBtn.classList.add('secondary');
            status.textContent = "Select a track to play";
        };

        stopBtn.onclick = () => {
            sm.stop();
            document.querySelectorAll('.track-item').forEach(i => i.classList.remove('active'));
            status.textContent = "Music stopped";
        };

        render();
        draw();
    </script>
</body>
</html>
